<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Board — Portfolio Project</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --border: #2a2a2a;
      --accent: #c8f060;
      --accent2: #ff6b6b;
      --text: #f0ede6;
      --muted: #777;
      --done-color: #555;
      --radius: 4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 100px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .stats {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: var(--radius);
      text-align: center;
      min-width: 90px;
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 620px;
      margin-bottom: 12px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row input::placeholder { color: var(--muted); }

    .select-wrap {
      position: relative;
    }

    .select-wrap select {
      appearance: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 14px 36px 14px 14px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .btn-add {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 14px 22px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .btn-add:hover { opacity: 0.85; }
    .btn-add:active { transform: scale(0.97); }

    .filter-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 620px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .task-list {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      transition: border-color 0.2s, opacity 0.3s;
      animation: slideIn 0.25s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: #3a3a3a; }

    .task-item.done {
      opacity: 0.5;
    }

    .task-check {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .task-item.done .task-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-check svg { display: none; }
    .task-item.done .task-check svg { display: block; }

    .task-text {
      flex: 1;
      font-size: 0.85rem;
      line-height: 1.4;
      transition: color 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done-color);
    }

    .task-tag {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 3px 8px;
      border-radius: 2px;
      border: 1px solid;
      flex-shrink: 0;
    }

    .tag-work    { color: #60a5fa; border-color: #60a5fa33; background: #60a5fa0d; }
    .tag-personal{ color: #f472b6; border-color: #f472b633; background: #f472b60d; }
    .tag-design  { color: #a78bfa; border-color: #a78bfa33; background: #a78bfa0d; }
    .tag-code    { color: var(--accent); border-color: #c8f06033; background: #c8f0600d; }
    .tag-other   { color: var(--muted); border-color: #55555533; background: #5555550d; }

    .task-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 3px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .task-delete:hover { color: var(--accent2); }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    .clear-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 7px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      transition: border-color 0.2s, color 0.2s;
      letter-spacing: 0.08em;
    }

    .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  </style>
</head>
<body>

<header>
  <h1>Task<span>Board</span></h1>
  <p>Portfolio Project · Interactive To-Do App</p>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-num" id="stat-total">0</div>
    <div class="stat-label">Total</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-active">0</div>
    <div class="stat-label">Active</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-done">0</div>
    <div class="stat-label">Done</div>
  </div>
</div>

<div class="input-row">
  <input type="text" id="task-input" placeholder="Add a new task…" maxlength="120"/>
  <div class="select-wrap">
    <select id="tag-select">
      <option value="work">Work</option>
      <option value="personal">Personal</option>
      <option value="design">Design</option>
      <option value="code">Code</option>
      <option value="other">Other</option>
    </select>
  </div>
  <button class="btn-add" onclick="addTask()">+ Add</button>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  <button class="filter-btn" onclick="setFilter('work', this)">Work</button>
  <button class="filter-btn" onclick="setFilter('personal', this)">Personal</button>
  <button class="filter-btn" onclick="setFilter('design', this)">Design</button>
  <button class="filter-btn" onclick="setFilter('code', this)">Code</button>
</div>

<div class="task-list" id="task-list"></div>

<button class="clear-btn" onclick="clearDone()">Clear completed</button>

<script>
  let tasks = JSON.parse(localStorage.getItem('portfolio-tasks') || '[]');
  let filter = 'all';

  if (tasks.length === 0) {
    tasks = [
      { id: 1, text: 'Build portfolio landing page', tag: 'design', done: true },
      { id: 2, text: 'Add responsive navigation menu', tag: 'code', done: true },
      { id: 3, text: 'Write project case studies', tag: 'work', done: false },
      { id: 4, text: 'Upload latest design work', tag: 'design', done: false },
      { id: 5, text: 'Connect contact form backend', tag: 'code', done: false },
      { id: 6, text: 'Optimize images for performance', tag: 'work', done: false },
    ];
    save();
  }

  function save() {
    localStorage.setItem('portfolio-tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const tag = document.getElementById('tag-select').value;
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, tag, done: false });
    input.value = '';
    save();
    render();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    save(); render();
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('task-list');
    let visible = tasks;

    if (filter === 'active') visible = tasks.filter(t => !t.done);
    else if (filter === 'done') visible = tasks.filter(t => t.done);
    else if (['work','personal','design','code','other'].includes(filter))
      visible = tasks.filter(t => t.tag === filter);

    document.getElementById('stat-total').textContent = tasks.length;
    document.getElementById('stat-active').textContent = tasks.filter(t => !t.done).length;
    document.getElementById('stat-done').textContent = tasks.filter(t => t.done).length;

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">✓</div>Nothing here yet.</div>`;
      return;
    }

    list.innerHTML = visible.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
        <div class="task-check" onclick="toggle(${t.id})">
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4L4 7.5L10 1" stroke="#0d0d0d" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="task-text">${escHtml(t.text)}</span>
        <span class="task-tag tag-${t.tag}">${t.tag}</span>
        <button class="task-delete" onclick="remove(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
